spring:
  application:
    name: blps_kt
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/blps}
    username: ${DATABASE_USERNAME:blps}
    password: ${DATABASE_PASSWORD:blps}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: false
      open-in-view: false
      properties:
        hibernate:
          jdbc:
            lob:
              non_contextual_creation: true
          format_sql: true
          dialect: org.hibernate.dialect.PostgreSQLDialect
logging:
  level:
    org.springframework.security: Trace
